services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: nyc-taxi-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: nyc-taxi-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  spark:
    build:
      context: ./spark_jobs
      dockerfile: Dockerfile
    image: nyc-taxi-spark:local
    container_name: nyc-taxi-spark
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./:/app
    working_dir: /app

  mlflow:
    image: python:3.11-slim
    container_name: nyc-taxi-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir mlflow==2.12.2 &&
             mlflow server --host 0.0.0.0 --port 5000
             --backend-store-uri sqlite:///mlflow.db
             --default-artifact-root /app/mlartifacts"

  producer:
    build:
      context: ./producer
    container_name: nyc-taxi-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: yellow_taxi_trips
      RAW_TAXI_PARQUET: /app/data/raw/yellow_tripdata_2023-01.parquet
      PRODUCER_MAX_ROWS: 10000
      PRODUCER_BATCH_SIZE: 500
      PRODUCER_SLEEP_SECONDS: 0.2
    volumes:
      - ./:/app
    working_dir: /app
    profiles:
      - pipeline

  dashboard:
    image: nyc-taxi-spark:local
    container_name: nyc-taxi-dashboard
    ports:
      - "8501:8501"
    environment:
      DELTA_GOLD_PATH: /app/data/delta/gold/fare_features
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MPLCONFIGDIR: /tmp/matplotlib
      GIT_PYTHON_REFRESH: quiet
    volumes:
      - ./:/app
    working_dir: /app
    command: >
      python -m streamlit run ml_pipeline/dashboard.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
      --browser.gatherUsageStats false
    profiles:
      - dashboard
